<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Golden Bakery</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  
  <preconnect href="https://fonts.googleapis.com" />
  <preconnect href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" crossorigin href="./index-B3vWOb-V.css" />
</head>
<body>

  <div id="root"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const supabaseUrl = "https://wxngmqbwnhreccxvhojv.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind4bmdtcWJ3bmhyZWNjeHZob2p2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDEyNzE3OTMsImV4cCI6MjA1Njg0Nzc5M30.GvtICdApzB_5qood7gcq1sC4fTv4q0utsQnEsBIOI0Q";

    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    // 1. Load menu items from database
    async function loadMenu() {
      try {
        const { data: menuItems, error } = await supabaseClient
          .from('menu_items')
          .select('*');
          
        if (error) return;

        const menuContainer = document.getElementById('menu-container');
        if (!menuContainer) return;

        menuContainer.innerHTML = "";

        menuItems.forEach(item => {
          const itemCard = `
            <div class="menu-card">
              <img src="${item.image_url}" alt="${item.name}" class="menu-img">
              <h3>${item.name}</h3>
              <p>${item.description}</p>
              <span class="price">₹${item.price}</span>
              <button onclick="addToCart('${item.id}', '${item.name}', ${item.price})">Add to Cart</button>
            </div>
          `;
          menuContainer.insertAdjacentHTML('beforeend', itemCard);
        });
      } catch (err) {
        console.error(err);
      }
    }

    // 2. Direct instant checkout handler via whatsapp
    function handleOnlineCheckout(event) {
      const target = event.target;
      if (target && (target.innerText.toLowerCase().includes('place order') || target.innerText.toLowerCase().includes('checkout'))) {
        
        // Target typical inputs generated inside the React bundle
        const nameInput = document.querySelector('input[placeholder*="Name"]') || document.querySelector('input[type="text"]');
        const phoneInput = document.querySelector('input[placeholder*="Phone"]') || document.querySelector('input[type="tel"]');
        const totalElement = document.querySelector('.total-price') || document.querySelector('[class*="total"]') || document.querySelector('h3');

        const customerName = nameInput && nameInput.value.trim() ? nameInput.value : "Customer";
        const customerPhone = phoneInput && phoneInput.value.trim() ? phoneInput.value : "Not Specified";
        const totalAmount = totalElement ? totalElement.innerText : "Check Application Cart";

        // Your specific Whatsapp Number attached directly
        const myPhoneNumber = "919948058392";

        // Build string notification text string format
        const messageText = `🚨 *New Order - Golden Bakery* 🚨\n\n👤 *Name:* ${customerName}\n📞 *Phone:* ${customerPhone}\n💰 *Total bill amount:* ${totalAmount}\n\nPlease accept and process my order!`;
        const encodedMessage = encodeURIComponent(messageText);

        // Fire active external application context forward seamlessly
        window.open(`https://wa.me/${myPhoneNumber}?text=${encodedMessage}`, '_blank');
      }
    }

    // Initialize triggers clearly
    document.addEventListener('DOMContentLoaded', loadMenu);
    document.addEventListener('click', handleOnlineCheckout);
  </script>

  <script type="module" crossorigin src="./index-CS_Uzv2Q.js"></script>
</body>
</html>
