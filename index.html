<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

  <link rel="stylesheet" crossorigin href="./index-B3vW0b-V.css">
<style>
/* --- DESIGNMETER UI/UX OVERRIDES --- */

/* 1. Fix Button Contrast & Clarity */
.btn, .button, [class*="button"], [class*="btn"], button {
  background-color: #ff6b6b !important; 
  color: #ffffff !important;            
  padding: 14px 28px !important;        
  font-size: 18px !important;           
  font-weight: bold !important;
  border-radius: 8px !important;
  display: inline-block !important;
}

/* 2. Fix Mobile Text & Responsive Layout Stack */
@media (max-width: 768px) {
  body, p, span, li {
    font-size: 16px !important;        
    line-height: 1.6 !important;       
  }
  h1 {
    font-size: 32px !important;        
  }
  .container, .row, .flex, [class*="container"], [class*="wrap"] {
    display: flex !important;
    flex-direction: column !important; 
    align-items: center !important;
    width: 100% !important;
  }
  a, button {
    min-height: 48px !important;       
    min-width: 48px !important;
  }
}
</style>

</head>
<body>

  <div id="root"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const supabaseUrl = "https://wxngmqbwnhreccxvhojv.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc2MiOiJzdXBhYmFzZSIsInJvbGUiOiJhbm9uIiwiaWF0IjoxN2Fub25mZmZzZSIImFub24iLCJpY00zQiQiOjE3ODMzMzYyMDMsImV4cCI6M2CcCI6MjA1ODkxMjIwM30.GvtHlA6pzR_Kpood7gccglsC4fFvH4gbJsiyQnIs82Q";
    
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    // 1. Load menu items from database
    async function loadMenu() {
      try {
        const { data: menuItems, error } = await supabaseClient.from('menu_items').select('*');
        if (error) return;

        const menuContainer = document.getElementById('menu-container');
        if (!menuContainer) return;
        
        menuContainer.innerHTML = '';

        menuItems.forEach(item => {
          const itemCard = `
            <div class="menu-card">
              <img src="${item.image_url}" alt="${item.name}" class="menu-img">
              <h3>${item.name}</h3>
              <p>${item.description}</p>
              <span class="price">₹${item.price}</span>
              <button onclick="addToCart('${item.id}', '${item.name}', ${item.price})">Add to Cart</button>
            </div>
          `;
          menuContainer.insertAdjacentHTML('beforeend', itemCard);
        });
      } catch (err) {
        console.error(err);
      }
    }

    // 2. Direct Instant Checkout Handler via WhatsApp
    function handleOnlineCheckout(event) {
      const target = event.target;
      if (target && (target.innerText.toLowerCase().includes('place order') || target.innerText.toLowerCase().includes('checkout'))) {
        
        // Target typical inputs generated inside the React bundle
        const nameInput = document.querySelector('input[placeholder*="Name"]') || document.querySelector('input[type="text"]');
        const phoneInput = document.querySelector('input[placeholder*="Phone"]') || document.querySelector('input[type="tel"]');
        const totalElement = document.querySelector('.total-price') || document.querySelector('[class*="total"]') || document.querySelector('h3');

        const customerName = nameInput && nameInput.value.trim() ? nameInput.value : "Customer";
        const customerPhone = phoneInput && phoneInput.value.trim() ? phoneInput.value : "Not Specified";
        const totalAmount = totalElement ? totalElement.innerText : "Check Application Cart";

        // Your specific WhatsApp Number attached directly
        const myPhoneNumber = "919948058392"; 
        
        // Build crisp notification text string format
        const messageText = `🚨 *New Order - Golden Bakery* 🚨\n\n👤 *Name:* ${customerName}\n📞 *Phone:* ${customerPhone}\n💰 *Total bill amount:* ${totalAmount}\n\n Please accept and process my order!`;
        const encodedMessage = encodeURIComponent(messageText);
        
        // Fire native external application context forward seamlessly
        window.open(`https://wa.me/${myPhoneNumber}?text=${encodedMessage}`, '_blank');
      }
    }

    // Initialize triggers cleanly
    document.addEventListener('DOMContentLoaded', loadMenu);
    document.addEventListener('click', handleOnlineCheckout);
  </script>

  <script type="module" crossorigin src="./index-CS_Uzv2Q.js"></script>

</body>
</html>
